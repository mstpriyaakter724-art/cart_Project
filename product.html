<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.1/css/all.min.css"
        integrity="sha256-2XFplPlrFClt0bIdPgpz8H7ojnk10H69xRqd9+uTShA=" crossorigin="anonymous" />

    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

   <style>/* ===== PRODUCTOS DESTACADOS ===== */



    .product-card {
      display: flex;
    }

    /* Tarjeta */
    .product-card-inner {
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      width: 100%;

      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      transition: transform .35s ease, box-shadow .35s ease;
    }

    /* CONTENEDOR CUADRADO */
    .product-image {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      /* 🔥 cuadrado perfecto */
      background: #000000;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .product-image:hover img {

      background: #ffffff;
    }

    /* IMAGEN AJUSTADA */
    .product-image img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* cover si quieres zoom */
      padding: 12px;
      transition: transform .4s ease;
    }

    /* Hover premium */
    .product-card-inner:hover {
      transform: translateY(-10px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.15);
    }

    .product-card-inner:hover img {
      transform: scale(1.08);
    }

    /* Texto */
    .product-card-inner h5 {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .product-card-inner .price {
      font-weight: 700;
      margin-bottom: 14px;
    }

    /* ===== ANIMACIONES SCROLL ===== */

    .reveal-item {
      opacity: 0;
      transform: translateY(60px);
      transition: opacity .6s ease, transform .6s ease;
    }

    .reveal-item.active {
      opacity: 1;
      transform: translateY(0);
    }
    </style>

</head>
<body>


<div class="container">

      <!-- TITULO -->
      <div class="section-header text-center mb-5 reveal">
        <h2 class="fw-bold">featured product</h2>
        <p class="text-muted">The most requested by our customers</p>
      </div>

      <!-- GRID -->
      <div class="row g-4 products-grid showProduct">

        <!-- PRODUCTO -->
        <div class="col-md-4 product-card reveal-item active">
          <div class="product-card-inner">

            <div class="product-image">
              <img src="${product.thumbnail}" alt="Smart TV QLED 65">
              <img class="pic-2" src="${product.images}">
            </div>

            <h5>${product.title}</h5>
            <p class="price">$${product.price}</p>
             <ul class="product-links">
                                    <li><a href="#"><i class="fa fa-search"></i></a></li>
                                    <li onclick = 'add_to_cart(${cartproduct})' ><a href="#"><i class="fas fa-shopping-cart"></i></a></li>
                                    <li><a href="#"><i class="fa fa-random"></i></a></li>
                                </ul>

          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
</body>
</body>
</html>
