<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="" id="todo"><br><br>
    <button id="btn">Submit</button>
    <ul id="list">

    </ul>
<script>
    document.getElementById("btn").addEventListener("click", function(){
     let todo_value = document.getElementById("todo");
     let list = document.getElementById("list");
     if ( todo_value.value == " "){
   alert (" Please, enter a value");
     }  else{
        list.innerHTML += ` <li> ${todo_value.value}  <button onclick = " deleteItem(this)">Delete </button></li>`;
        todo_value.value = (" ");
     }


    })
    function deleteItem(abc) {
        abc.parentElement.remove();
    }
</script>



</body>
</html>
